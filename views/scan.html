<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BotWA Scanner</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 420px;
            width: 100%;
            padding: 24px;
        }

        .card {
            background: linear-gradient(145deg, #13131a, #1a1a24);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 32px 24px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .logo span {
            color: #4ade80;
        }

        .subtitle {
            color: #666;
            font-size: 13px;
            margin-bottom: 24px;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .status.waiting {
            background: rgba(250, 204, 21, 0.1);
            color: #facc15;
        }

        .status.connected {
            background: rgba(74, 222, 128, 0.1);
            color: #4ade80;
        }

        .status.error {
            background: rgba(248, 113, 113, 0.1);
            color: #f87171;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        .waiting .dot {
            background: #facc15;
        }

        .connected .dot {
            background: #4ade80;
            animation: none;
        }

        .error .dot {
            background: #f87171;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.3
            }
        }

        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            padding: 4px;
        }

        .tab {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: #888;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab.active {
            background: rgba(74, 222, 128, 0.15);
            color: #4ade80;
        }

        #qr-section img {
            display: block;
            margin: 0 auto 16px;
            border-radius: 12px;
            background: #fff;
            padding: 12px;
            max-width: 280px;
            width: 100%;
        }

        #qr-section .waiting-msg {
            color: #888;
            font-size: 14px;
            padding: 40px 0;
        }

        .input-group {
            position: relative;
            margin-bottom: 12px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: #4ade80;
        }

        .input-group input::placeholder {
            color: #555;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #4ade80, #22c55e);
            color: #000;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(74, 222, 128, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .code-display {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 6px;
            color: #4ade80;
            margin: 16px 0;
            font-family: 'JetBrains Mono', monospace;
        }

        .code-name {
            color: #888;
            font-size: 12px;
        }

        .connected-info {
            padding: 20px 0;
        }

        .connected-info .name {
            font-size: 18px;
            font-weight: 600;
            color: #4ade80;
        }

        .connected-info .id {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        .connected-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .hidden {
            display: none !important;
        }

        .error-msg {
            color: #f87171;
            font-size: 13px;
            margin-top: 8px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="logo">Bot<span>WA</span></div>
            <div class="subtitle">WhatsApp Bot Scanner</div>
            <div class="status waiting" id="status">
                <div class="dot"></div>
                <span>Menunggu koneksi...</span>
            </div>

            <div id="scan-area">
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('qr')">QR Code</button>
                    <button class="tab" onclick="switchTab('pair')">Pairing Code</button>
                </div>

                <div id="qr-section">
                    <div class="waiting-msg">Menunggu QR Code dari server...</div>
                </div>

                <div id="pair-section" class="hidden">
                    <div class="input-group">
                        <input type="tel" id="phone" placeholder="Nomor WA (contoh: 628xxx)" />
                    </div>
                    <button class="btn" id="pair-btn" onclick="requestPairing()">Generate Pairing Code</button>
                    <div id="pair-result"></div>
                    <div id="pair-error" class="error-msg"></div>
                </div>
            </div>

            <div id="connected-area" class="hidden">
                <div class="connected-info">
                    <div class="connected-icon">✅</div>
                    <div class="name" id="bot-name"></div>
                    <div class="jid" id="bot-jid"></div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const ws = new WebSocket((location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host);
        const statusEl = document.getElementById('status');
        const scanArea = document.getElementById('scan-area');
        const connArea = document.getElementById('connected-area');
        const qrSection = document.getElementById('qr-section');

        function setStatus(type, text) {
            statusEl.className = 'status ' + type;
            statusEl.innerHTML = '<div class="dot"></div><span>' + text + '</span>';
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', (tab === 'qr' ? i === 0 : i === 1));
            });
            document.getElementById('qr-section').classList.toggle('hidden', tab !== 'qr');
            document.getElementById('pair-section').classList.toggle('hidden', tab !== 'pair');
        }

        function requestPairing() {
            const phone = document.getElementById('phone').value.trim();
            if (!phone) return;
            document.getElementById('pair-btn').disabled = true;
            document.getElementById('pair-error').textContent = '';
            document.getElementById('pair-result').innerHTML = '<div style="color:#888;padding:12px">Generating...</div>';
            ws.send(JSON.stringify({ type: 'pairing', phone }));
        }

        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);

            if (data.type === 'qr') {
                setStatus('waiting', 'Scan QR Code di bawah');
                scanArea.classList.remove('hidden');
                connArea.classList.add('hidden');
                qrSection.innerHTML = '<img src="' + data.qr + '" alt="QR Code" />';
            }

            if (data.type === 'connected') {
                setStatus('connected', 'Terhubung');
                scanArea.classList.add('hidden');
                connArea.classList.remove('hidden');
                document.getElementById('bot-name').textContent = data.user?.name || 'Bot';
                document.getElementById('bot-jid').textContent = data.user?.id || '';
            }

            if (data.type === 'waiting') {
                setStatus('waiting', 'Menunggu koneksi...');
                scanArea.classList.remove('hidden');
                connArea.classList.add('hidden');
            }

            if (data.type === 'pairing_code') {
                document.getElementById('pair-btn').disabled = false;
                document.getElementById('pair-result').innerHTML =
                    '<div class="code-display">' + data.code + '</div>' +
                    '<div class="code-name">Nama: ' + data.name + '</div>';
            }

            if (data.type === 'error') {
                document.getElementById('pair-btn').disabled = false;
                document.getElementById('pair-error').textContent = data.message;
                document.getElementById('pair-result').innerHTML = '';
            }

            if (data.type === 'disconnected') {
                setStatus('error', 'Terputus');
                scanArea.classList.remove('hidden');
                connArea.classList.add('hidden');
            }
        };

        ws.onclose = () => setStatus('error', 'WebSocket terputus');
    </script>
</body>

</html>
